<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Console de Testes – Auth API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #fafafa;
    }
    section {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #ddd;
    }
    h1, h2 {
      color: #333;
      margin-bottom: 0.5rem;
    }
    label {
      display: block;
      margin: 0.5rem 0;
    }
    input {
      padding: 0.5rem;
      font-size: 1rem;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 0.75rem;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    pre {
      margin-top: 1rem;
      padding: 1rem;
      background: #272822;
      color: #f8f8f2;
      overflow-x: auto;
      border-radius: 4px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.95rem;
    }
    .key { color: #f92672; }
    .string { color: #e6db74; }
    .number { color: #ae81ff; }
    .boolean { color: #66d9ef; }
    .null { color: #fd971f; }
  </style>
</head>
<body>

  <h1>Console de Testes – Auth API</h1>

  <!-- Registro Cliente -->
  <section id="sec-cliente">
    <h2>1. Registro de Cliente</h2>
    <form id="form-cliente">
      <label>Nome         <input name="nome"       required /></label>
      <label>Telefone     <input name="telefone"   required /></label>
      <label>Endereço     <input name="endereco"   required /></label>
      <label>Gostos       <input name="gostos"     required /></label>
      <label>Email        <input type="email" name="email"    required /></label>
      <label>Senha        <input type="password" name="senha" required /></label>
      <button type="submit">Registrar Cliente</button>
    </form>
    <pre id="res-cliente"></pre>
  </section>

  <!-- Registro Produtor -->
  <section id="sec-produtor">
    <h2>2. Registro de Produtor</h2>
    <form id="form-produtor">
      <label>Nome         <input name="nome"       required /></label>
      <label>Telefone     <input name="telefone"   required /></label>
      <label>Endereço     <input name="endereco"   required /></label>
      <label>Nome da Loja <input name="nomeLoja"   required /></label>
      <label>Descrição    <input name="descricao"  required /></label>
      <label>Email        <input type="email" name="email"    required /></label>
      <label>Senha        <input type="password" name="senha" required /></label>
      <button type="submit">Registrar Produtor</button>
    </form>
    <pre id="res-produtor"></pre>
  </section>

  <!-- Login -->
  <section id="sec-login">
    <h2>3. Login</h2>
    <form id="form-login">
      <label>Email        <input type="email" name="email" required /></label>
      <label>Senha        <input type="password" name="senha" required /></label>
      <button type="submit">Fazer Login</button>
    </form>
    <pre id="res-login"></pre>
  </section>

  <!-- Verificar Token -->
  <section id="sec-verificar">
    <h2>4. Verificar Token</h2>
    <form id="form-verificar">
      <label>Token JWT    <input name="token" required placeholder="Bearer &lt;token&gt;" /></label>
      <button type="submit">Verificar</button>
    </form>
    <pre id="res-verificar"></pre>
  </section>

  <script>
    const URL_BASE = 'http://localhost:5211/api/Auth';

    function syntaxHighlight(json) {
      if (typeof json !== 'string') {
        json = JSON.stringify(json, null, 2);
      }
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(:)?|\b(true|false|null)\b|-?\d+(\.\d*)?([eE][+\-]?\d+)?)/g,
        function (match) {
          let cls = 'number';
          if (/^"/.test(match)) {
            if (/:$/.test(match)) {
              cls = 'key';
            } else {
              cls = 'string';
            }
          } else if (/true|false/.test(match)) {
            cls = 'boolean';
          } else if (/null/.test(match)) {
            cls = 'null';
          }
          return '<span class="' + cls + '">' + match + '</span>';
        }
      );
    }

    async function submeter(formId, route, method, resultId, buildBody, buildHeaders) {
      const form = document.getElementById(formId);
      const pre  = document.getElementById(resultId);
      form.addEventListener('submit', async e => {
        e.preventDefault();
        pre.innerHTML = '<em>Enviando…</em>';
        const url = `${URL_BASE}/${route}`;
        const formData = new FormData(form);
        const body = buildBody(formData);
        const headers = buildHeaders ? buildHeaders(formData) : {};
        
        if (body) {
          headers['Content-Type'] = 'application/json';
        }
        
        try {
          const res = await fetch(url, { method, headers, body });
          const text = await res.text();
          if (res.ok) {
            try {
              const obj = JSON.parse(text);
              pre.innerHTML = syntaxHighlight(obj);
            } catch (e) {
              pre.innerHTML = text; 
            }
          } else {
            if (res.status === 401) {
              pre.textContent = "Erro 401: Acesso não autorizado. Verifique o token.";
            } else {
              pre.textContent = `Erro ${res.status}:\n${text}`;
            }
          }
        } catch (err) {
          pre.textContent = `Falha de rede ou servidor:\n${err.message}`;
        }
      });
    }

    submeter(
      'form-cliente', 'registro-cliente', 'POST', 'res-cliente',
      fd => JSON.stringify(Object.fromEntries(fd))
    );
    submeter(
      'form-produtor', 'registro-produtor', 'POST', 'res-produtor',
      fd => JSON.stringify(Object.fromEntries(fd))
    );
    submeter(
      'form-login', 'login', 'POST', 'res-login',
      fd => JSON.stringify(Object.fromEntries(fd))
    );
    submeter(
      'form-verificar', 'verificar', 'GET', 'res-verificar',
      () => null, 
      fd => {
        const token = fd.get('token');
        if (!token) {
          return { 'Authorization': 'Bearer <seu_token_aqui>' }; 
        }
        return { 'Authorization': `Bearer ${token}` };
      }
    );
  </script>

</body>
</html>
